<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Navbar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar__inner">
            <div class="topbar__left">
                <a class="pill pill--brand" href="#">
                    <span class="brand-icon">f</span>
                    <span class="pill__text">Flipkart</span>
                </a>
                <a class="pill pill--travel" href="#">
                    <svg class="pill__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21.9 10.7c-.2-.5-.7-.8-1.2-.8h-6.2L9.9 4.6c-.2-.4-.6-.6-1-.6H7.6c-.5 0-.8.4-.6.9l2.1 5.1H4.4c-.3 0-.6.2-.7.5l-.7 1.8c-.2.5.1 1 .6 1h5.6l-1.9 4.7c-.2.5.1 1 .6 1h1.3c.4 0 .8-.2 1-.6l2.5-4h5.9c.5 0 1-.3 1.2-.8l.7-1.8c.1-.1.1-.3 0-.5z"></path>
                    </svg>
                    <span class="pill__text">Travel</span>
                </a>
            </div>
            <div class="topbar__right">
                <div class="location">
                    <svg class="location__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2.8c-3.6 0-6.4 2.8-6.4 6.3 0 4.8 6 11.2 6.2 11.5.1.1.2.2.4.2s.3-.1.4-.2c.3-.3 6.2-6.7 6.2-11.5 0-3.5-2.8-6.3-6.4-6.3zm0 9.1c-1.6 0-2.8-1.2-2.8-2.8s1.2-2.8 2.8-2.8 2.8 1.2 2.8 2.8-1.2 2.8-2.8 2.8z"></path>
                    </svg>
                    <span class="location__text">Location not set</span>
                    <a class="location__link" href="#">Select delivery location <span class="location__arrow">&gt;</span></a>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
